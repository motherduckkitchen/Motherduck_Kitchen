<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mother Duck Kitchen - Sign in</title><link rel="stylesheet" href="site.css"></head><body><div class="wash"></div><main class="page center"><section class="card"><img class="logo" src="logo.png" alt="Mother Duck Logo"><h1 class="title">Sign in</h1><input class="input" type="email" id="email" placeholder="Email"><input class="input" type="password" id="password" placeholder="Password"><button class="btn" id="loginBtn" type="button">Log in</button><div class="status" id="status">Ready.</div><p class="note">Use your Firebase Authentication email/password user.</p></section></main><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="firebase-config.js"></script><script>window.addEventListener("load",function(){const s=document.getElementById("status"),b=document.getElementById("loginBtn"),e=document.getElementById("email"),p=document.getElementById("password");function show(m,ok){s.textContent=m;s.style.color=ok?"#18794e":"#b42318"}if(!window.firebase){show("Firebase library did not load.",false);return}if(!window.MDK_FIREBASE_CONFIG){show("firebase-config.js did not load.",false);return}try{if(!firebase.apps.length)firebase.initializeApp(window.MDK_FIREBASE_CONFIG);const auth=firebase.auth();show("Firebase ready.",true);auth.onAuthStateChanged(function(u){if(u){show("Login success. Opening dashboard...",true);setTimeout(function(){location.href="dashboard.html"},450)}});b.onclick=function(){const email=e.value.trim(),pass=p.value;if(!email||!pass){show("Enter email and password.",false);return}show("Signing in...",true);auth.signInWithEmailAndPassword(email,pass).then(function(){show("Signed in successfully.",true)}).catch(function(err){show("Login failed: "+err.message,false)})}}catch(err){show("Script error: "+err.message,false)}});</script></body></html>
