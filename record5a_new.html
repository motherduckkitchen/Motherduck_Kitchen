<script>
  const STORAGE_KEY = "record5a_new_final_locked";

  function todayDate() {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const yyyy = d.getFullYear();
    return `${dd}/${mm}/${yyyy}`;
  }

  function currentTime() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return `${hh}:${mm}`;
  }

  function makeProcessSelect() {
    const select = document.createElement("select");
    ["", "Ck", "Cl", "Rh"].forEach(v => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      select.appendChild(opt);
    });
    return select;
  }

  function lockField(el) {
    el.disabled = true;
    el.style.color = "#222";
    el.style.opacity = "1";
    el.style.background = "transparent";
  }

  function unlockField(el) {
    el.disabled = false;
  }

  function buildRows() {
    const tbody = document.getElementById("rows");
    tbody.innerHTML = "";

    for (let i = 0; i < 10; i++) {
      const tr = document.createElement("tr");
      tr.dataset.row = i;

      for (let c = 0; c < 15; c++) {
        const td = document.createElement("td");

        if (c === 2) {
          const select = makeProcessSelect();
          select.dataset.row = i;
          select.dataset.col = c;
          td.appendChild(select);
          tr.appendChild(td);
          continue;
        }

        const input = document.createElement("input");
        input.type = "text";
        input.dataset.row = i;
        input.dataset.col = c;

        if (c === 0) {
          input.addEventListener("focus", function () {
            if (!input.value) input.value = todayDate();
          });
        }

        if (c === 3 || c === 4 || c === 6 || c === 8 || c === 10 || c === 12) {
          input.addEventListener("focus", function () {
            if (!input.value) input.value = currentTime();
          });
        }

        td.appendChild(input);
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
  }

  function getRowFields(rowIndex) {
    return document.querySelectorAll(`#rows [data-row="${rowIndex}"]`);
  }

  function rowHasData(rowIndex) {
    const fields = getRowFields(rowIndex);
    for (const field of fields) {
      if ((field.value || "").trim() !== "") return true;
    }
    return false;
  }

  function saveForm() {
    const rows = [];

    for (let r = 0; r < 10; r++) {
      const fields = Array.from(getRowFields(r)).map(el => el.value || "");
      const locked = rowHasData(r);
      rows.push({ fields, locked });
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));

    for (let r = 0; r < 10; r++) {
      const row = rows[r];
      if (row.locked) {
        getRowFields(r).forEach(lockField);
      }
    }

    alert("Saved and locked");
  }

  function loadForm() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;

    const rows = JSON.parse(saved);

    rows.forEach((row, r) => {
      const fields = getRowFields(r);
      fields.forEach((field, i) => {
        field.value = row.fields[i] || "";
        if (row.locked) {
          lockField(field);
        }
      });
    });
  }

  function clearForm() {
    if (!confirm("Clear all rows and unlock the form?")) return;

    document.querySelectorAll("#rows input, #rows select").forEach(el => {
      el.value = "";
      unlockField(el);
    });

    localStorage.removeItem(STORAGE_KEY);
  }

  buildRows();
  loadForm();

  // auto-fill first row date
  const firstDate = document.querySelector('#rows input[data-row="0"][data-col="0"]');
  if (firstDate && !firstDate.value) {
    firstDate.value = todayDate();
  }
</script>
