<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mother Duck Kitchen - Transfer Log</title><link rel="stylesheet" href="site.css"></head><body><div class="wash"></div><main class="page"><div class="top"><img class="logo" src="logo.png" alt="Mother Duck Logo"><div class="site-title">Mother Duck Kitchen</div><div class="subtitle">Transfer Log</div></div><section class="card-wide"><div class="toolbar"><a class="btn secondary" href="dashboard.html">Home</a><a class="btn secondary" href="kitchen.html">Kitchen</a><a class="btn secondary" href="brewer_st.html">Brewer St</a></div><div class="two-col"><section class="panel"><h2>Add Transfer</h2><label>From site</label><select id="fromSite"><option>Kitchen</option><option>Brewer St</option></select><label>To site</label><select id="toSite"><option>Brewer St</option><option>Kitchen</option></select><label>Item</label><input class="input" id="itemInput" placeholder="Item name"><label>Qty</label><input class="input" id="qtyInput" placeholder="Qty"><label>Temp</label><input class="input" id="tempInput" type="number" step="0.1" placeholder="Temperature °C"><button class="btn" id="saveTransferBtn" type="button">Save Transfer</button><p class="note">Auto date/time stamp is added when saved.</p></section><section class="panel"><h2>Transfer History</h2><table class="table"><thead><tr><th>Date</th><th>Time</th><th>From</th><th>To</th><th>Item</th><th>Qty</th><th>Temp</th></tr></thead><tbody id="transferRows"></tbody></table></section></div></section></main><script>const KEY="mdk_transfer_log_v2";function stampNow(){const d=new Date(),z=n=>String(n).padStart(2,"0");return{date:`${z(d.getDate())}/${z(d.getMonth()+1)}/${d.getFullYear()}`,time:`${z(d.getHours())}:${z(d.getMinutes())}`}}function getTransfers(){try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch(e){return[]}}function setTransfers(items){localStorage.setItem(KEY,JSON.stringify(items))}function renderTransfers(){const rows=document.getElementById("transferRows"),items=getTransfers().slice().reverse();rows.innerHTML="";if(!items.length){rows.innerHTML="<tr><td colspan='7'>No transfers saved yet.</td></tr>";return}items.forEach(item=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${item.date}</td><td>${item.time}</td><td>${item.from}</td><td>${item.to}</td><td>${item.item}</td><td>${item.qty}</td><td>${item.temp}</td>`;rows.appendChild(tr)})}document.getElementById("saveTransferBtn").addEventListener("click",function(){const from=document.getElementById("fromSite").value,to=document.getElementById("toSite").value,item=document.getElementById("itemInput").value.trim(),qty=document.getElementById("qtyInput").value.trim(),temp=document.getElementById("tempInput").value.trim();if(!item){alert("Enter an item.");return}const s=stampNow(),items=getTransfers();items.push({date:s.date,time:s.time,from,to,item,qty,temp});setTransfers(items);document.getElementById("itemInput").value="";document.getElementById("qtyInput").value="";document.getElementById("tempInput").value="";renderTransfers();alert("Transfer saved.")});renderTransfers();</script></body></html>
