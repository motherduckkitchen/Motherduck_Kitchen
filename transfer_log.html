
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Transfer Log</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div id="mdk-hide" style="position:fixed;inset:0;background:#fff;z-index:9999"></div>
  <div class="wash"></div>
  <main class="wrap">
    <header class="brand">
      <img src="logo.png" alt="Mother Duck Logo">
      <h1>Mother Duck Kitchen</h1>
      <div class="subhead">Kitchen ↔ Brewer St Transfers</div>
    </header>
    <div class="toolbar">
      <a class="btn small" href="dashboard.html">Home</a>
      <a class="btn small" href="kitchen.html">Kitchen</a>
      <a class="btn small" href="brewer_st.html">Brewer St</a>
      <button class="btn small" onclick="mdkLogout()">Log out</button>
    </div>

    <section class="panel">
      <div class="card-white">
        <h3>Add transfer</h3>
        <div class="row">
          <div>
            <label>From</label>
            <select id="fromSite">
              <option>Kitchen</option>
              <option>Brewer St</option>
            </select>
          </div>
          <div>
            <label>To</label>
            <select id="toSite">
              <option>Brewer St</option>
              <option>Kitchen</option>
            </select>
          </div>
        </div>
        <label>Item / batch</label>
        <input class="input" id="itemInput" placeholder="Example: Pumpkin soup / batch 3">
        <div class="row">
          <div>
            <label>Qty</label>
            <input class="input" id="qtyInput" placeholder="Example: 4 trays">
          </div>
          <div>
            <label>Temperature °C</label>
            <input class="input" id="tempInput" type="number" step="0.1" placeholder="Example: 4.0">
          </div>
        </div>
        <button class="btn" type="button" id="saveTransferBtn">Save transfer</button>
        <p class="muted">Date and time stamp are added automatically when saved.</p>
      </div>

      <div style="height:18px"></div>

      <div class="card-white">
        <h3>Transfer history</h3>
        <table class="table">
          <thead>
            <tr><th>Date</th><th>Time</th><th>From</th><th>To</th><th>Item</th><th>Qty</th><th>Temp °C</th></tr>
          </thead>
          <tbody id="transferRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="shared/firebase-config.js"></script>
  <script src="shared/auth-guard.js"></script>
  <script>
    const KEY = "mdk_transfer_log_v1";
    function stamp(){
      const d = new Date();
      const z = n => String(n).padStart(2,"0");
      return {
        date: `${z(d.getDate())}/${z(d.getMonth()+1)}/${d.getFullYear()}`,
        time: `${z(d.getHours())}:${z(d.getMinutes())}`
      };
    }
    function getTransfers(){
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch(e){ return []; }
    }
    function setTransfers(items){ localStorage.setItem(KEY, JSON.stringify(items)); }
    function renderTransfers(){
      const rows = document.getElementById("transferRows");
      const items = getTransfers().reverse();
      rows.innerHTML = items.length ? "" : "<tr><td colspan='7'>No transfers saved yet.</td></tr>";
      items.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${item.date}</td><td>${item.time}</td><td>${item.from}</td><td>${item.to}</td><td>${item.item}</td><td>${item.qty}</td><td>${item.temp}</td>`;
        rows.appendChild(tr);
      });
    }
    document.getElementById("saveTransferBtn").addEventListener("click", () => {
      const from = document.getElementById("fromSite").value;
      const to = document.getElementById("toSite").value;
      const item = document.getElementById("itemInput").value.trim();
      const qty = document.getElementById("qtyInput").value.trim();
      const temp = document.getElementById("tempInput").value.trim();
      if (!item) { alert("Enter item or batch."); return; }
      const s = stamp();
      const items = getTransfers();
      items.push({ date:s.date, time:s.time, from, to, item, qty, temp });
      setTransfers(items);
      document.getElementById("itemInput").value = "";
      document.getElementById("qtyInput").value = "";
      document.getElementById("tempInput").value = "";
      renderTransfers();
      alert("Transfer saved.");
    });
    renderTransfers();
  </script>
</body>
</html>
