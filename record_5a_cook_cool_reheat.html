<script>

function todayDate(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function nowTime(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}

function buildRows(){

const tbody=document.getElementById("rows");

for(let i=0;i<12;i++){

let tr=document.createElement("tr");

for(let c=0;c<15;c++){

let td=document.createElement("td");

let input=document.createElement("input");
input.type="text";

/* DATE FIELD */
if(c===0){
input.addEventListener("focus",function(){
if(!input.value) input.value=todayDate();
});
}

/* TIME FIELDS */
if(c===3 || c===4 || c===6 || c===8 || c===10 || c===12){
input.addEventListener("focus",function(){
if(!input.value) input.value=nowTime();
});
}

td.appendChild(input);
tr.appendChild(td);

}

tbody.appendChild(tr);

}

}

function saveForm(){

let data=[];

document.querySelectorAll("input").forEach(i=>{
data.push(i.value);
});

localStorage.setItem("record5a",JSON.stringify(data));

alert("Saved");

}

function clearForm(){

if(!confirm("Clear form?")) return;

document.querySelectorAll("input").forEach(i=>{
i.value="";
});

localStorage.removeItem("record5a");

}

function loadForm(){

let data=localStorage.getItem("record5a");

if(!data) return;

data=JSON.parse(data);

document.querySelectorAll("input").forEach((i,index)=>{
i.value=data[index]||"";
});

}

buildRows();
loadForm();

</script>
