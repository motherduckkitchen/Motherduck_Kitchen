<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Sign in</title>
  <link rel="stylesheet" href="site.css">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
    .login-card{width:100%;max-width:460px}
    .login-card img{width:110px;display:block;margin:0 auto 10px}
    .status{margin-top:12px;min-height:24px;color:#b42318;font-weight:700;text-align:center;white-space:pre-wrap}
    .debug{margin-top:12px;font-size:13px;color:#555;word-break:break-all}
  </style>
</head>
<body>
  <div class="wash"></div>
  <main class="login-wrap">
    <section class="card-white login-card">
      <img src="logo.png" alt="Mother Duck Logo">
      <h2 style="text-align:center">Sign in</h2>
      <input class="input" type="email" id="email" placeholder="Email">
      <input class="input" type="password" id="password" placeholder="Password">
      <button class="btn" id="loginBtn" type="button">Log in</button>
      <div class="status" id="status">Loading…</div>
      <div class="debug" id="debug"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    window.MDK_FIREBASE_CONFIG = {
      apiKey: "AIzaSyBRTV9KfMYjCGk1XYnsCoOBZaZ9h-sU6UA",
      authDomain: "motherduckkitchen-e2e1c.firebaseapp.com",
      projectId: "motherduckkitchen-e2e1c",
      storageBucket: "motherduckkitchen-e2e1c.firebasestorage.app",
      messagingSenderId: "459081978963",
      appId: "1:459081978963:web:8ac93c105b4a86c504a2a6",
      measurementId: "G-F1933BLB5H"
    };

    const statusBox = document.getElementById("status");
    const debugBox = document.getElementById("debug");
    const loginBtn = document.getElementById("loginBtn");

    function showStatus(msg, ok = false) {
      statusBox.textContent = msg;
      statusBox.style.color = ok ? "#18794e" : "#b42318";
    }

    function showDebug() {
      debugBox.textContent =
        "apiKey: " + window.MDK_FIREBASE_CONFIG.apiKey +
        "\nauthDomain: " + window.MDK_FIREBASE_CONFIG.authDomain +
        "\nprojectId: " + window.MDK_FIREBASE_CONFIG.projectId +
        "\npage: " + location.href;
    }

    showDebug();

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
      }

      const auth = firebase.auth();
      showStatus("Firebase ready.", true);

      auth.onAuthStateChanged(function(user) {
        if (user) {
          showStatus("Login success. Opening dashboard...", true);
          setTimeout(function () {
            location.href = "dashboard.html";
          }, 500);
        }
      });

      loginBtn.onclick = function() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showStatus("Enter email and password.");
          return;
        }

        showStatus("Signing in...", true);

        auth.signInWithEmailAndPassword(email, password)
          .then(function() {
            showStatus("Signed in successfully.", true);
          })
          .catch(function(err) {
            showStatus("Login failed: " + err.message);
          });
      };
    } catch (err) {
      showStatus("Script error: " + err.message);
    }
  </script>
</body>
</html>
