<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Sign in</title>
  <link rel="stylesheet" href="site.css">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
    .login-card{width:100%;max-width:420px}
    .login-card img{width:110px;display:block;margin:0 auto 10px}
    .status{margin-top:12px;min-height:24px;color:#b42318;font-weight:700;text-align:center;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wash"></div>
  <main class="login-wrap">
    <section class="card-white login-card">
      <img src="logo.png" alt="Mother Duck Logo">
      <h2 style="text-align:center">Sign in</h2>

      <input class="input" type="email" id="email" placeholder="Email">
      <input class="input" type="password" id="password" placeholder="Password">
      <button class="btn" id="loginBtn" type="button">Log in</button>

      <div class="status" id="status">Ready.</div>
      <p class="muted" style="text-align:center">Use your Firebase Authentication email/password user.</p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    window.addEventListener("load", function () {
      const statusBox = document.getElementById("status");
      const loginBtn = document.getElementById("loginBtn");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");

      function showStatus(msg, ok) {
        statusBox.textContent = msg;
        statusBox.style.color = ok ? "#18794e" : "#b42318";
        console.log(msg);
      }

      showStatus("Page loaded.", true);

      if (!window.firebase) {
        showStatus("Firebase library did not load.", false);
        return;
      }

      if (!window.MDK_FIREBASE_CONFIG) {
        showStatus("firebase-config.js did not load.", false);
        return;
      }

      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
        }

        const auth = firebase.auth();
        showStatus("Firebase ready.", true);

        auth.onAuthStateChanged(function (user) {
          if (user) {
            showStatus("Login success. Opening dashboard...", true);
            setTimeout(function () {
              location.href = "dashboard.html";
            }, 500);
          }
        });

        loginBtn.onclick = function () {
          const email = emailInput.value.trim();
          const password = passwordInput.value;

          showStatus("Button clicked.", true);

          if (!email || !password) {
            showStatus("Enter email and password.", false);
            return;
          }

          showStatus("Signing in...", true);

          auth.signInWithEmailAndPassword(email, password)
            .then(function () {
              showStatus("Signed in successfully.", true);
            })
            .catch(function (err) {
              showStatus("Login failed: " + err.message, false);
              console.error(err);
            });
        };
      } catch (err) {
        showStatus("Script error: " + err.message, false);
        console.error(err);
      }
    });
  </script>
</body>
</html>
