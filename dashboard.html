<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mother Duck Kitchen - Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:url("kitchen.jpg") center/cover no-repeat fixed;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(3px);
}
.page{
  position:relative;
  z-index:1;
  text-align:center;
}
.logo{
  width:90px;
  display:block;
  margin:auto;
}
.site-title{
  font-size:38px;
  font-weight:700;
  color:white;
  margin-top:10px;
  margin-bottom:25px;
  text-shadow:0 2px 6px rgba(0,0,0,.4);
}
.card-wide{
  width:600px;
  max-width:90%;
  margin:auto;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.btn{
  padding:18px;
  background:#204a9b;
  color:white;
  border-radius:14px;
  font-weight:bold;
  text-decoration:none;
  display:block;
  font-size:18px;
}
.btn:hover{
  background:#183c80;
}
.secondary{
  background:#ddd;
  color:#333;
}
</style>
</head>

<body>
<div class="wash"></div>

<main class="page">
  <img class="logo" src="logo.png" alt="Mother Duck Logo">
  <div class="site-title">Mother Duck Kitchen</div>

  <section class="card-wide">
    <div class="menu-grid">
      <a class="btn" href="kitchen.html">Kitchen</a>
      <a class="btn" href="brewer_st.html">Brewer St</a>
      <a class="btn" href="invoices.html">Invoices</a>
      <a class="btn" href="nursery_new.html">Nursery</a>
      <a class="btn" href="food_safety_bible_new.html">Food Safety Bible</a>
      <a class="btn" href="pest_control.html">Pest Control</a>
      <a class="btn" href="food_recall.html">Food Recall</a>
      <a class="menu-btn" href="staff_illness.html">Staff Illness / Accident</a>
    </div>

    <div style="margin-top:20px">
      <a class="btn secondary" style="display:inline-block;width:200px" href="index.html">Log out</a>
    </div>
  </section>
</main>
</body>
</html>
