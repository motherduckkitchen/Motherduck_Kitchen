<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Record 12 - Supervisor Checklist</title>
<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:url("kitchen.jpg") center/cover fixed no-repeat;
}
.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(2px);
}
.page{
  position:relative;
  z-index:1;
  max-width:1400px;
  margin:auto;
  padding:20px;
}
.mdk-toolbar{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
  align-items:center;
}
.mdk-btn--back{
  background:#ffc107;
  border:none;
  color:#4b0082;
  font-weight:700;
  padding:10px 18px;
  border-radius:12px;
  cursor:pointer;
  text-decoration:none;
}
.mdk-btn--pill{
  background:#f8fafc;
  border:1px solid #cfd6dd;
  border-radius:12px;
  padding:8px 14px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  color:#222;
}
.mdk-btn--primary{
  background:#007bff;
  border:none;
  border-radius:12px;
  padding:10px 18px;
  font-weight:600;
  color:white;
  cursor:pointer;
}
.sheet-card{
  background:rgba(255,255,255,.95);
  border-radius:20px;
  box-shadow:0 12px 30px rgba(0,0,0,.14);
  padding:20px;
  overflow:auto;
}
.sheet-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:16px;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  background:#fff;
}
th,td{
  border:1px solid #222;
  padding:6px;
  font-size:13px;
  text-align:center;
  vertical-align:middle;
}
th{
  background:#f4f6f8;
}
input{
  width:100%;
  border:none;
  background:transparent;
  outline:none;
  text-align:center;
  font-size:13px;
}
.left input{
  text-align:left;
}
.notes{
  margin-top:16px;
  font-size:14px;
  line-height:1.5;
}
@page{
  size:A4 landscape;
  margin:10mm;
}
@media print{
  .mdk-toolbar{display:none;}
  body{background:#fff;}
  .wash{display:none;}
  .sheet-card{box-shadow:none;border-radius:0;padding:0;}
}
</style>
</head>
<body>

<div class="wash"></div>

<main class="page">

  <div class="mdk-toolbar">
    <a href="kitchen.html" class="mdk-btn--back">← Back</a>
    <a href="dashboard.html" class="mdk-btn--pill">Home</a>
    <button class="mdk-btn--pill" onclick="window.print()" type="button">Print</button>
    <button class="mdk-btn--pill" onclick="clearForm()" type="button">Clear</button>
    <button class="mdk-btn--primary" onclick="saveForm()" type="button">Save</button>
  </div>

  <div class="sheet-card">
    <h1 class="sheet-title">Record 12 - Supervisor Checklist</h1>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Supervisor</th>
          <th>Food Handling</th>
          <th>Temperature Control</th>
          <th>Cleaning</th>
          <th>Pest Control</th>
          <th>Staff Hygiene</th>
          <th>Corrective Action</th>
          <th>Initial</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="notes">
      Complete this checklist to confirm food safety supervision tasks have been checked and any corrective action has been recorded.
    </div>
  </div>

</main>

<script>
const STORAGE="record12_v2";

function todayDate(){
  const d=new Date();
  const dd=String(d.getDate()).padStart(2,"0");
  const mm=String(d.getMonth()+1).padStart(2,"0");
  const yyyy=d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function row(){
  let tr=document.createElement("tr");
  for(let i=0;i<9;i++){
    let td=document.createElement("td");
    if(i===1 || i===7) td.className="left";
    let input=document.createElement("input");
    if(i===0){
      input.addEventListener("focus",function(){
        if(!input.value) input.value=todayDate();
      });
    }
    td.appendChild(input);
    tr.appendChild(td);
  }
  return tr;
}

function build(){
  let body=document.getElementById("tbody");
  body.innerHTML="";
  for(let i=0;i<15;i++) body.appendChild(row());

  const saved=localStorage.getItem(STORAGE);
  if(saved){
    const data=JSON.parse(saved);
    const inputs=document.querySelectorAll("#tbody input");
    inputs.forEach((inp,i)=>inp.value=data[i]||"");
  }
}

function saveForm(){
  let data=[];
  document.querySelectorAll("#tbody input").forEach(i=>data.push(i.value));
  localStorage.setItem(STORAGE,JSON.stringify(data));
  alert("Saved");
}

function clearForm(){
  if(!confirm("Clear form?")) return;
  document.querySelectorAll("#tbody input").forEach(i=>i.value="");
  localStorage.removeItem(STORAGE);
}

build();
</script>

</body>
</html>
