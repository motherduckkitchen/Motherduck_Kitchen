<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Audit Archive</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:url("kitchen.jpg") center/cover no-repeat fixed;
      min-height:100vh;
    }
    .wash{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.45);
      backdrop-filter:blur(4px);
    }
    .page{
      position:relative;
      z-index:1;
      min-height:100vh;
      padding:24px;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .btn{
      padding:10px 16px;
      border-radius:12px;
      border:none;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      background:#f8fafc;
      border:1px solid #cfd6dd;
      color:#222;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .back{
      background:#ffc107;
      color:#4b0082;
      border:none;
    }
    .card{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-radius:24px;
      padding:24px;
      box-shadow:0 12px 30px rgba(0,0,0,.14);
    }
    h1{
      margin:0 0 18px;
      font-size:32px;
      color:#1f2937;
    }
    .site-block{
      margin-bottom:22px;
      border:1px solid #d7dde4;
      border-radius:18px;
      overflow:hidden;
      background:#fff;
    }
    .site-head{
      background:#244996;
      color:#fff;
      padding:14px 18px;
      font-size:22px;
      font-weight:800;
    }
    .year-block{
      padding:16px 18px;
      border-top:1px solid #e5e7eb;
    }
    .year-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:10px;
      color:#1f2937;
    }
    .month-block{
      margin:10px 0 18px;
      border:1px solid #e5e7eb;
      border-radius:14px;
      overflow:hidden;
    }
    .month-title{
      background:#f4f6f8;
      padding:10px 14px;
      font-size:17px;
      font-weight:700;
      color:#223;
    }
    .record-list{
      padding:10px 14px 14px;
      display:grid;
      gap:10px;
    }
    .record-card{
      border:1px solid #d9dee6;
      border-radius:12px;
      padding:12px 14px;
      background:#fff;
    }
    .record-type{
      font-size:16px;
      font-weight:800;
      color:#1f2937;
      margin-bottom:4px;
    }
    .record-meta{
      font-size:13px;
      color:#555;
      margin:2px 0;
    }
    .empty{
      color:#666;
      font-size:14px;
      padding:8px 0;
    }
  </style>
</head>
<body>
<div class="wash"></div>

<main class="page">
  <div class="wrap">
    <div class="toolbar">
      <a href="dashboard.html" class="btn back">← Back</a>
      <a href="kitchen.html" class="btn">Kitchen</a>
      <a href="brewer_st.html" class="btn">Brewer St</a>
    </div>

    <div class="card">
      <h1>Audit Archive</h1>
      <div id="archiveWrap" class="empty">Loading archive...</div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="archive_shared.js"></script>

<script>
const MONTH_NAMES = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

function parseDDMMYYYY(str){
  if(!str) return null;
  const parts = str.split("/").map(s => s.trim());
  if(parts.length !== 3) return null;

  const day = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10);
  const year = parseInt(parts[2], 10);
  if(!day || !month || !year) return null;

  const d = new Date(year, month - 1, day);
  if(
    d.getFullYear() !== year ||
    d.getMonth() !== month - 1 ||
    d.getDate() !== day
  ) return null;

  return d;
}

function groupRecords(records){
  const grouped = {};

  records.forEach(record => {
    const site = record.site || "Unknown";
    const dateObj = parseDDMMYYYY(record.recordDate || "");
    const year = dateObj ? String(dateObj.getFullYear()) : "No Year";
    const monthIndex = dateObj ? dateObj.getMonth() : -1;
    const monthName = monthIndex >= 0 ? MONTH_NAMES[monthIndex] : "No Month";

    if(!grouped[site]) grouped[site] = {};
    if(!grouped[site][year]) grouped[site][year] = {};
    if(!grouped[site][year][monthName]) grouped[site][year][monthName] = [];

    grouped[site][year][monthName].push(record);
  });

  return grouped;
}

function monthSortValue(monthName){
  const idx = MONTH_NAMES.indexOf(monthName);
  return idx === -1 ? 999 : idx;
}

function renderArchive(records){
  const wrap = document.getElementById("archiveWrap");

  if(!records || !records.length){
    wrap.innerHTML = `<div class="empty">No saved archive records yet.</div>`;
    return;
  }

  const grouped = groupRecords(records);
  const siteNames = Object.keys(grouped).sort();

  let html = "";

  siteNames.forEach(site => {
    html += `<div class="site-block">`;
    html += `<div class="site-head">${site}</div>`;

    const years = Object.keys(grouped[site]).sort((a,b) => Number(b) - Number(a));

    years.forEach(year => {
      html += `<div class="year-block">`;
      html += `<div class="year-title">${year}</div>`;

      const months = Object.keys(grouped[site][year]).sort((a,b) => monthSortValue(a) - monthSortValue(b));

      months.forEach(month => {
        html += `<div class="month-block">`;
        html += `<div class="month-title">${month}</div>`;
        html += `<div class="record-list">`;

        grouped[site][year][month].forEach(record => {
          html += `
            <div class="record-card">
              <div class="record-type">${record.type || "Record"}</div>
              <div class="record-meta"><strong>Date:</strong> ${record.recordDate || ""}</div>
              <div class="record-meta"><strong>Site:</strong> ${record.site || ""}</div>
              <div class="record-meta"><strong>ID:</strong> ${record.id || ""}</div>
            </div>
          `;
        });

        html += `</div></div>`;
      });

      html += `</div>`;
    });

    html += `</div>`;
  });

  wrap.innerHTML = html;
}

async function loadArchive(){
  const wrap = document.getElementById("archiveWrap");

  try{
    if(window.MDKArchive && window.MDKArchive.getAllRecords){
      const records = await window.MDKArchive.getAllRecords();
      renderArchive(records);
      return;
    }

    wrap.innerHTML = `<div class="empty">Archive tool not ready yet.</div>`;
  } catch(err){
    console.error(err);
    wrap.innerHTML = `<div class="empty">Could not load archive.</div>`;
  }
}

loadArchive();
</script>
</body>
</html>
