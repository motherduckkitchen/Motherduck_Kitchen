<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Record 7a - Thermometer Calibration Log</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:url("kitchen.jpg") center center / cover no-repeat fixed;
    }
    .wash{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.45);
      backdrop-filter:blur(2px);
    }
    .page{
      position:relative;
      z-index:1;
      max-width:1500px;
      margin:0 auto;
      padding:20px;
    }
    .toolbar{
      display:flex;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      padding:10px 16px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-weight:700;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#222;
      background:#f8fafc;
      border:1px solid #cfd6dd;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .back{
      background:#ffc107;
      color:#4b0082;
      border:none;
    }
    .save{
      background:#007bff;
      color:#fff;
      border:none;
    }
    .card{
      background:rgba(255,255,255,.95);
      padding:20px;
      border-radius:20px;
      box-shadow:0 12px 30px rgba(0,0,0,.14);
      overflow:auto;
    }
    h1{
      margin:0 0 16px;
      font-size:28px;
      font-weight:700;
      color:#1f2937;
    }
    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      background:#fff;
    }
    th,td{
      border:1px solid #222;
      padding:6px;
      text-align:center;
      vertical-align:middle;
      font-size:12px;
    }
    th{
      background:#f4f6f8;
      font-weight:700;
    }
    input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      text-align:center;
      font-size:12px;
      padding:4px;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }
    td:first-child input{
      text-align:left;
    }
    .notes{
      margin-top:16px;
      font-size:13px;
      line-height:1.5;
      color:#222;
    }
    .lines{
      margin-top:10px;
    }
    .line{
      border-bottom:2px solid #666;
      height:22px;
      margin-top:6px;
    }
    @page{
      size:A4 landscape;
      margin:10mm;
    }
    @media print{
      .toolbar{display:none;}
      body{background:#fff;}
      .wash{display:none;}
      .page{max-width:none;padding:0;}
      .card{box-shadow:none;border-radius:0;padding:0;}
      h1{font-size:24px;}
      th,td,input{font-size:11px;}
      .notes{font-size:11px;}
    }
  </style>
</head>
<body>
  <div class="wash"></div>

  <main class="page">
    <div class="toolbar">
      <a href="kitchen.html" class="btn back">← Back</a>
      <a href="dashboard.html" class="btn">🏠 Home</a>
      <button class="btn" onclick="window.print()" type="button">🖨 Print</button>
      <button class="btn" onclick="clearForm()" type="button">🧹 Clear</button>
      <button class="btn save" onclick="saveForm()" type="button">💾 Save</button>
    </div>

    <div class="card">
      <h1>Record 7a - Thermometer Calibration Log</h1>

      <table>
        <colgroup>
          <col style="width:16%">
          <col style="width:8%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
          <col style="width:6%">
        </colgroup>
        <thead>
          <tr>
            <th>Thermometer</th>
            <th></th>
            <th>Jan</th>
            <th>Feb</th>
            <th>Mar</th>
            <th>Apr</th>
            <th>May</th>
            <th>Jun</th>
            <th>Jul</th>
            <th>Aug</th>
            <th>Sep</th>
            <th>Oct</th>
            <th>Nov</th>
            <th>Dec</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <div class="notes">
        Thermometers must be accurate to ± 1°C of the Ice Point (0°C) and the Boiling Point (100°C)
      </div>

      <div class="notes">
        <strong>CORRECTIVE ACTIONS: (Date &amp; Action Taken)</strong>
        <div class="lines">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "thermometer_calibration_v1";

    function todayDate() {
      const d = new Date();
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yyyy = d.getFullYear();
      return dd + "/" + mm + "/" + yyyy;
    }

    function buildRows() {
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";

      for (let thermo = 0; thermo < 3; thermo++) {
        const labels = ["Date", "Initials", "Ice point - Boiling Point"];

        for (let r = 0; r < 3; r++) {
          const tr = document.createElement("tr");

          if (r === 0) {
            const tdThermo = document.createElement("td");
            tdThermo.rowSpan = 3;
            const inputThermo = document.createElement("input");
            inputThermo.type = "text";
            inputThermo.placeholder = "Thermometer name";
            inputThermo.dataset.kind = "thermo";
            tdThermo.appendChild(inputThermo);
            tr.appendChild(tdThermo);
          }

          const tdLabel = document.createElement("td");
          tdLabel.textContent = labels[r];
          tr.appendChild(tdLabel);

          for (let m = 0; m < 12; m++) {
            const td = document.createElement("td");
            const input = document.createElement("input");
            input.type = "text";

            if (r === 0) {
              input.addEventListener("focus", function () {
                if (!input.value) input.value = todayDate();
              });
            }

            td.appendChild(input);
            tr.appendChild(td);
          }

          tbody.appendChild(tr);
        }
      }
    }

    function saveForm() {
      const data = [];
      document.querySelectorAll("table input").forEach(function(el) {
        data.push(el.value);
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      alert("Saved");
    }

    function loadForm() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      const data = JSON.parse(saved);
      const fields = document.querySelectorAll("table input");
      fields.forEach(function(field, i) {
        field.value = data[i] || "";
      });
    }

    function clearForm() {
      if (!confirm("Clear form?")) return;
      document.querySelectorAll("table input").forEach(function(el) {
        el.value = "";
      });
      localStorage.removeItem(STORAGE_KEY);
    }

    buildRows();
    loadForm();
  </script>
</body>
</html>
