<body>

<script>

function todayDate(){

let d=new Date()

let day=String(d.getDate()).padStart(2,'0')
let month=String(d.getMonth()+1).padStart(2,'0')
let year=d.getFullYear()

return day+" / "+month+" / "+year

}

document.getElementById("today").innerText=todayDate()

function saveForm(){

let data=[]
document.querySelectorAll("input").forEach(i=>data.push(i.value))
localStorage.setItem("cleaning",JSON.stringify(data))
alert("Saved")

}

function loadForm(){

let saved=localStorage.getItem("cleaning")

if(!saved)return

let data=JSON.parse(saved)

document.querySelectorAll("input").forEach((i,index)=>{
i.value=data[index]||""
})

}

function clearForm(){

if(!confirm("Clear form?"))return

document.querySelectorAll("input").forEach(i=>i.value="")

localStorage.removeItem("cleaning")

}

loadForm()

</script>

</body>
</html>
