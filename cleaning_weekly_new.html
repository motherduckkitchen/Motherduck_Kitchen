<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Record 6b – Weekly Cleaning Schedule</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:url("kitchen.jpg") center/cover no-repeat fixed;
}
.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(2px);
}
.page{
  position:relative;
  z-index:1;
  max-width:1400px;
  margin:auto;
  padding:20px;
}
.toolbar{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  background:#204a9b;
  color:white;
}
.back{
  background:#ffc107;
  color:black;
}
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  overflow:auto;
}
h1{
  margin:0 0 14px 0;
  font-size:28px;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  margin-bottom:18px;
}
th,td{
  border:1px solid black;
  padding:6px;
  font-size:13px;
  text-align:center;
  vertical-align:top;
}
th{
  background:#efede4;
}
.area{
  text-align:left;
  width:36%;
}
.daybox{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  text-align:center;
  font-size:13px;
  min-height:28px;
}
.week-input{
  width:180px;
  border:none;
  outline:none;
  background:transparent;
  font-size:14px;
  font-weight:600;
}
.footer{
  margin-top:16px;
  font-size:12px;
  color:#333;
}
@page{
  size:A4 landscape;
  margin:10mm;
}
@media print{
  .toolbar{display:none;}
  body{background:white;}
  .wash{display:none;}
  .page{max-width:none;padding:0;}
  .card{box-shadow:none;border-radius:0;padding:0;}
}
</style>
</head>
<body>

<div class="wash"></div>

<main class="page">

<div class="toolbar">
  <a class="btn back" href="kitchen.html">Back</a>
  <button class="btn" onclick="window.print()">Print</button>
  <button class="btn" onclick="clearForm()">Clear</button>
  <button class="btn" onclick="saveForm()">Save</button>
</div>

<div class="card">

<h1>Record 6b – Weekly Cleaning Schedule</h1>

<div id="weeklyBlocks"></div>

<div class="footer">
  Food Safety Program - Mother Duck Kallangur (1) January 2021 - Transport Amendment.docx<br>
  Accredited Food Safety Program - Food Act 2006 (QLD) - LI/2021/0345. Accredited by Michael Taylor (Authorised Person Moreton Bay Regional Council) 23 March 2021
</div>

</div>
</main>

<script>
const STORAGE_KEY = "weekly_clean_blocks_v1";

const tasks = [
  "Clean out fridge (wipe over shelves and inside doors)",
  "Clean inside of ovens",
  "Clean out chemical cupboard (refill chemicals when required)",
  "Clean pantry (wiping over every shelf and checking for expired food items) if expired discard food items. Wipe over pantry windowsill.",
  "Sweep and mop pantry floor"
];

function formatAusDate(date){
  const d = String(date.getDate()).padStart(2,'0');
  const m = String(date.getMonth()+1).padStart(2,'0');
  const y = date.getFullYear();
  return d + " / " + m + " / " + y;
}

function buildBlocks(){
  const wrap = document.getElementById("weeklyBlocks");
  wrap.innerHTML = "";

  for(let block = 0; block < 4; block++){
    const table = document.createElement("table");

    const thead = `
      <thead>
        <tr>
          <th class="area">
            Week Commencing:
            <input class="week-input" type="date" data-block="${block}" data-type="weekstart">
          </th>
          <th colspan="5">Initial as Completed</th>
        </tr>
        <tr>
          <th class="area">WEEKLY or more often if required</th>
          <th>M</th>
          <th>T</th>
          <th>W</th>
          <th>T</th>
          <th>F</th>
        </tr>
      </thead>
    `;

    let tbody = "<tbody>";

    tasks.forEach((task, rowIndex) => {
      tbody += `<tr><td class="area">${task}</td>`;

      for(let day = 0; day < 5; day++){
        tbody += `<td><input type="checkbox" class="daybox" data-block="${block}" data-row="${rowIndex}" data-day="${day}"></td>`;
        tbody += `</tr>`;
    });

    tbody += "</tbody>";

    table.innerHTML = thead + tbody;
    wrap.appendChild(table);
  }
}

function saveForm(){
  const data = {
    weeks: [],
    boxes: []
  };

  document.querySelectorAll('input[data-type="weekstart"]').forEach(el => {
    data.weeks.push(el.value);
  });

  document.querySelectorAll('.daybox').forEach(el => {
    data.boxes.push(el.value);
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  alert("Saved");
}

function loadForm(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(!saved) return;

  const data = JSON.parse(saved);

  const weekInputs = document.querySelectorAll('input[data-type="weekstart"]');
  weekInputs.forEach((el, i) => {
    el.value = (data.weeks && data.weeks[i]) || "";
  });

  const boxes = document.querySelectorAll('.daybox');
  boxes.forEach((el, i) => {
    el.value = (data.boxes && data.boxes[i]) || "";
  });
}

function clearForm(){
  if(!confirm("Clear form?")) return;

  document.querySelectorAll('input').forEach(el => {
    el.value = "";
  });

  localStorage.removeItem(STORAGE_KEY);
}

buildBlocks();
loadForm();
</script>

</body>
</html>
